version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: liora-postgres
    environment:
      POSTGRES_USER: liora_user
      POSTGRES_PASSWORD: liora_secure_password
      POSTGRES_DB: liora_tradingdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U liora_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - liora-network

  redis:
    image: redis:7-alpine
    container_name: liora-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - liora-network

  prometheus:
    image: prom/prometheus:latest
    container_name: liora-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      - liora-network

  grafana:
    image: grafana/grafana:latest
    container_name: liora-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - liora-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: liora-api
    environment:
      DATABASE_URL: postgresql://liora_user:liora_secure_password@postgres:5432/liora_tradingdb
      REDIS_URL: redis://redis:6379/0
      PYTHONUNBUFFERED: 1
    ports:
      - "8000:8000"
      - "8001:8001"  # Metrics
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    command: python -m uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    networks:
      - liora-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  liora-network:
    driver: bridge

